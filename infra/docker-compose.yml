services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: letus_postgres
    environment:
      POSTGRES_DB: letus_dev
      POSTGRES_USER: letus
      POSTGRES_PASSWORD: localpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U letus']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: